<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HealthBreak</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #f8f8f6;
      color: #1a1a1a;
      padding: 24px;
      user-select: none;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; }

    /* ── Language switcher ───────────────────────────────────────── */
    .lang-switcher { display: flex; gap: 4px; flex-shrink: 0; margin-top: 2px; }
    .lang-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn:hover { border-color: #4CAF50; color: #4CAF50; }
    .lang-btn.active { background: #4CAF50; border-color: #4CAF50; color: white; }
    .btn-stats {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #4CAF50;
      cursor: pointer;
      transition: all 0.15s;
      border-color: #4CAF50;
    }
    .btn-stats:hover { background: #f1f8f1; }

    /* ── Testing mode badge ──────────────────────────────────────── */
    .testing-badge {
      display: none;
      align-items: center;
      gap: 8px;
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #f57f17;
      font-weight: 600;
    }
    .testing-badge.visible { display: flex; }
    .testing-badge .dot {
      width: 8px; height: 8px;
      background: #f57f17;
      border-radius: 50%;
      animation: blink 1s infinite;
      flex-shrink: 0;
    }
    .testing-badge .btn-exit-test {
      margin-left: auto;
      background: none;
      border: 1px solid #f57f17;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      color: #f57f17;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }
    .testing-badge .btn-exit-test:hover { background: #fff3e0; }
    .testing-badge .btn-clear-cache {
      background: none;
      border: 1px solid #c62828;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      color: #c62828;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }
    .testing-badge .btn-clear-cache:hover { background: #ffebee; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Cards ───────────────────────────────────────────────────── */
    .card {
      background: white;
      border-radius: 12px;
      border: 1px solid #eee;
      padding: 16px;
      margin-bottom: 12px;
      transition: box-shadow 0.2s;
    }
    .card.expanded { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card-top { display: flex; align-items: center; gap: 14px; }
    .card-icon { font-size: 24px; width: 44px; text-align: center; flex-shrink: 0; }
    .card-name { flex: 1; font-size: 14px; font-weight: 600; }
    /* desc sits below the flex row — full width minus icon indent */
    .card-desc {
      margin-top: 5px;
      padding-left: 58px; /* 44px icon + 14px gap */
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
    .card-timer { font-size: 13px; font-weight: 600; color: #555; min-width: 48px; text-align: right; flex-shrink: 0; }

    .btn-edit {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      color: #888;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-edit:hover { border-color: #4CAF50; color: #4CAF50; }
    .btn-edit.active { border-color: #4CAF50; color: #4CAF50; background: #f0faf0; }

    .toggle {
      width: 40px; height: 22px;
      background: #4CAF50;
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.off { background: #ccc; }
    .toggle::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      background: white;
      border-radius: 50%;
      top: 2px; right: 2px;
      transition: transform 0.2s;
    }
    .toggle.off::after { transform: translateX(-18px); }

    /* ── Expandable settings panel ───────────────────────────────── */
    .card-expand {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease, opacity 0.25s ease;
      opacity: 0;
    }
    .card-expand.open { max-height: 130px; opacity: 1; }
    .expand-inner {
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
      margin-top: 10px;
    }
    .expand-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .slider-label { font-size: 11px; color: #aaa; min-width: 26px; }
    .slider-label.right { text-align: right; }
    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #e0e0e0;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #4CAF50;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb:hover { background: #43A047; }
    .slider-value {
      font-size: 12px;
      font-weight: 600;
      color: #4CAF50;
      min-width: 52px;
      text-align: center;
    }
    .btn-save {
      width: 100%;
      padding: 8px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #43A047; }
    .btn-save:active { background: #388E3C; }

    /* ── Status bar ──────────────────────────────────────────────── */
    .status-bar {
      background: white;
      border-radius: 12px;
      border: 1px solid #eee;
      padding: 14px 16px;
      font-size: 13px;
      color: #555;
      text-align: center;
      margin-top: 4px;
    }
    .status-bar span { color: #4CAF50; font-weight: 600; }

    #logo { cursor: default; display: inline; }
    #logo.clickable { cursor: pointer; }

    /* ── Info button ─────────────────────────────────────────────── */
    .btn-info {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 1.5px solid #ccc;
      background: none;
      color: #aaa;
      font-size: 11px;
      font-style: italic;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .btn-info:hover { border-color: #4CAF50; color: #4CAF50; background: #f0faf0; }

    /* ── Info modal ──────────────────────────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: white;
      border-radius: 14px;
      width: 390px;
      max-height: 480px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      border-bottom: 1px solid #f0f0f0;
      flex-shrink: 0;
    }
    .modal-header-icon { font-size: 22px; }
    .modal-header-title { flex: 1; font-size: 15px; font-weight: 700; color: #1a1a1a; }
    .btn-modal-close {
      background: none;
      border: none;
      font-size: 18px;
      color: #aaa;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .btn-modal-close:hover { color: #555; }
    .modal-body {
      overflow-y: auto;
      padding: 14px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .modal-section.benefits .modal-section-title { color: #2e7d32; }
    .modal-section.risks    .modal-section-title { color: #e65100; }
    .modal-section ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .modal-section ul li {
      font-size: 12.5px;
      color: #444;
      line-height: 1.5;
      padding: 8px 10px;
      border-radius: 7px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .modal-section.benefits ul li { background: #f1f8f1; }
    .modal-section.risks    ul li { background: #fff8f3; }
    .modal-section.benefits ul li::before { content: '✓'; color: #4CAF50; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
    .modal-section.risks    ul li::before { content: '!'; color: #e65100; font-weight: 700; flex-shrink: 0; margin-top: 1px; }

    /* ── Daily stats ─────────────────────────────────────────────── */
    .card-stats {
      display: none;
      margin-top: 6px;
      padding-left: 58px;
      font-size: 11.5px;
      color: #4CAF50;
      font-weight: 600;
    }
    .card-stats.visible { display: block; }

    /* ── Water goal expand ───────────────────────────────────────── */
    #expand-water.open { max-height: 240px; }
    .goal-divider { border: none; border-top: 1px solid #f0f0f0; margin: 10px 0 10px; }
    .goal-input-row { display: flex; gap: 10px; margin-bottom: 8px; }
    .goal-input-group { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .goal-input-group label { font-size: 10px; color: #aaa; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .goal-input-group input[type=number] {
      width: 100%; padding: 5px 8px;
      border: 1px solid #e0e0e0; border-radius: 6px;
      font-size: 13px; font-weight: 600; color: #333; outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    .goal-input-group input[type=number]::-webkit-inner-spin-button,
    .goal-input-group input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .goal-input-group input[type=number]:focus { border-color: #1e88e5; }
    .goal-recommendation { font-size: 11px; color: #1e88e5; font-weight: 600; min-height: 16px; margin-bottom: 8px; }

    /* ── Onboarding overlay ──────────────────────────────────────── */
    #onboarding-overlay {
      position: fixed; inset: 0;
      background: white;
      z-index: 200;
      display: none;
      overflow: hidden;
    }
    .onboard-step {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 32px 32px;
      transition: opacity 0.25s ease, transform 0.25s ease;
      will-change: opacity, transform;
    }
    .onboard-step.ob-active       { opacity: 1;  transform: translateX(0);    pointer-events: auto; }
    .onboard-step.ob-hidden-left  { opacity: 0;  transform: translateX(-28px); pointer-events: none; }
    .onboard-step.ob-hidden-right { opacity: 0;  transform: translateX(28px);  pointer-events: none; }
    .onboard-dots {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px;
    }
    .onboard-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #e0e0e0; transition: background 0.2s;
    }
    .onboard-dot.active { background: #4CAF50; width: 20px; border-radius: 4px; }
    .onboard-lang {
      position: absolute; top: 14px; right: 16px;
      display: flex; gap: 4px;
      z-index: 10;
    }
    .onboard-logo { font-size: 56px; margin-bottom: 18px; }
    .onboard-title {
      font-size: 19px; font-weight: 700; color: #1a1a1a;
      margin-bottom: 10px; text-align: center;
    }
    .onboard-desc {
      font-size: 13px; color: #888; text-align: center;
      line-height: 1.6; max-width: 310px; margin-bottom: 32px;
    }
    .onboard-icon { font-size: 40px; margin-bottom: 14px; }
    .onboard-subdesc {
      font-size: 12px; color: #888; text-align: center;
      line-height: 1.6; max-width: 310px; margin-bottom: 20px;
    }
    .onboard-recommendation {
      font-size: 12px; color: #1e88e5; font-weight: 600;
      min-height: 20px; margin: 6px 0 18px; text-align: center;
    }
    .btn-onboard-primary {
      width: 100%; max-width: 320px; padding: 12px;
      background: #4CAF50; color: white;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background 0.15s; margin-bottom: 10px;
    }
    .btn-onboard-primary:hover  { background: #43A047; }
    .btn-onboard-primary:active { background: #388E3C; }
    .btn-onboard-skip {
      background: none; border: none; color: #bbb;
      font-size: 12px; cursor: pointer; padding: 4px 8px;
      transition: color 0.15s;
    }
    .btn-onboard-skip:hover { color: #888; }

    /* ── Auth / Cloud Sync card ──────────────────────────────────────── */
    .auth-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .auth-badge.offline { background: #f5f5f5; color: #aaa; border: 1px solid #e0e0e0; }
    .auth-badge.online  { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }

    .btn-auth {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-auth:hover { border-color: #4285F4; color: #4285F4; background: #f0f4ff; }
    .btn-auth.signout:hover { border-color: #e53935; color: #e53935; background: #fff5f5; }
    .btn-auth:disabled { opacity: 0.5; cursor: default; }

    /* ── Toast notification ──────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #323232;
      color: white;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      z-index: 500;
      white-space: nowrap;
    }
    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Migration / Restore dialog ──────────────────────────────────── */
    .dialog-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .dialog-backdrop.open { display: flex; }
    .dialog {
      background: white;
      border-radius: 14px;
      width: 340px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
      animation: slideUp 0.2s ease;
    }
    .dialog-title {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .dialog-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .dialog-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn-dialog-primary {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-dialog-primary:hover { background: #43A047; }
    .btn-dialog-secondary {
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-dialog-secondary:hover { border-color: #bbb; color: #333; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<div class="header">
  <div>
    <h1><span id="logo" onclick="handleLogoClick()">💚</span> HealthBreak</h1>
    <p class="subtitle" id="app-subtitle"></p>
  </div>
  <div class="lang-switcher">
    <button id="btn-lang-en" class="lang-btn" onclick="setLanguage('en')">EN</button>
    <button id="btn-lang-vi" class="lang-btn" onclick="setLanguage('vi')">VI</button>
    <button class="btn-stats" id="btn-stats" onclick="openDashboard()"></button>
    <div id="header-avatar" style="display:none; width:28px; height:28px; border-radius:50%; background:#4CAF50; color:white; font-size:13px; font-weight:700; align-items:center; justify-content:center; cursor:default;" title=""></div>
  </div>
</div>

<!-- ── Testing mode badge ───────────────────────────────────────────────── -->
<div class="testing-badge" id="testing-badge">
  <div class="dot"></div>
  <span id="testing-text"></span>
  <button class="btn-clear-cache" id="btn-clear-cache" onclick="clearCache()"></button>
  <button class="btn-exit-test" id="btn-exit-test" onclick="exitTestingMode()"></button>
</div>

<!-- ── Drink Water ──────────────────────────────────────────────────────── -->
<div class="card" id="card-water">
  <div class="card-top">
    <div class="card-icon">💧</div>
    <div class="card-name" id="card-name-water"></div>
    <button class="btn-info" onclick="openInfoModal('water')" title="Info">i</button>
    <div class="card-timer" id="timer-water">30:00</div>
    <button class="btn-edit" id="edit-water" onclick="toggleEdit('water')"></button>
    <div class="toggle" id="toggle-water" onclick="toggleReminder('water')"></div>
  </div>
  <div class="card-desc" id="desc-water"></div>
  <div class="card-stats" id="stats-water"></div>
  <div class="card-expand" id="expand-water">
    <div class="expand-inner">
      <div class="expand-row">
        <span class="slider-label" id="min-label-water"></span>
        <input type="range" id="slider-water" min="20" max="60" step="5" value="30"
          oninput="onSliderChange('water', this.value)">
        <span class="slider-label right" id="max-label-water"></span>
        <span class="slider-value" id="val-water"></span>
      </div>
      <button class="btn-save" id="save-water" onclick="saveAndRestart('water')"></button>
      <!-- ── Water goal section ── -->
      <hr class="goal-divider">
      <div class="goal-input-row">
        <div class="goal-input-group">
          <label id="goal-height-label"></label>
          <input type="number" id="input-height" min="100" max="250" placeholder="170"
            oninput="onGoalInputChange()">
        </div>
        <div class="goal-input-group">
          <label id="goal-weight-label"></label>
          <input type="number" id="input-weight" min="30" max="200" placeholder="65"
            oninput="onGoalInputChange()">
        </div>
      </div>
      <div class="goal-recommendation" id="goal-recommendation"></div>
      <button class="btn-save" id="save-goal" onclick="saveWaterGoalAndApply()"
        style="background:#1e88e5;"
        onmouseover="this.style.background='#1976D2'"
        onmouseout="this.style.background='#1e88e5'"></button>
    </div>
  </div>
</div>

<!-- ── Light Exercise ───────────────────────────────────────────────────── -->
<div class="card" id="card-move">
  <div class="card-top">
    <div class="card-icon">🏃</div>
    <div class="card-name" id="card-name-move"></div>
    <button class="btn-info" onclick="openInfoModal('move')" title="Info">i</button>
    <div class="card-timer" id="timer-move">60:00</div>
    <button class="btn-edit" id="edit-move" onclick="toggleEdit('move')"></button>
    <div class="toggle" id="toggle-move" onclick="toggleReminder('move')"></div>
  </div>
  <div class="card-desc" id="desc-move"></div>
  <div class="card-stats" id="stats-move"></div>
  <div class="card-expand" id="expand-move">
    <div class="expand-inner">
      <div class="expand-row">
        <span class="slider-label" id="min-label-move"></span>
        <input type="range" id="slider-move" min="45" max="90" step="5" value="60"
          oninput="onSliderChange('move', this.value)">
        <span class="slider-label right" id="max-label-move"></span>
        <span class="slider-value" id="val-move"></span>
      </div>
      <button class="btn-save" id="save-move" onclick="saveAndRestart('move')"></button>
    </div>
  </div>
</div>

<!-- ── Eye Rest ─────────────────────────────────────────────────────────── -->
<div class="card" id="card-eyes">
  <div class="card-top">
    <div class="card-icon">👁️</div>
    <div class="card-name" id="card-name-eyes"></div>
    <button class="btn-info" onclick="openInfoModal('eyes')" title="Info">i</button>

<script>
  const { ipcRenderer } = require('electron')

  // ── Localization ─────────────────────────────────────────────────────────
  const LANG_KEY  = 'healthbreak-lang'
  let currentLang = localStorage.getItem(LANG_KEY) || 'en'
  let locale      = (() => {
    try { return require(`./locales/${currentLang}.js`) }
    catch { return require('./locales/en.js') }
  })()

  function setLanguage(lang) {
    if (lang === currentLang) return
    currentLang = lang
    locale = require(`./locales/${lang}.js`)
    localStorage.setItem(LANG_KEY, lang)
    applyLocale()
    ipcRenderer.send('set-language', lang)
    if (typeof maybeSyncSettings === 'function') maybeSyncSettings()
  }

  function applyLocale() {
    // Subtitle
    document.getElementById('app-subtitle').textContent = locale.subtitle

    // Testing badge
    document.getElementById('testing-text').textContent      = locale.testing.badge
    document.getElementById('btn-clear-cache').textContent  = locale.testing.clearCache
    document.getElementById('btn-exit-test').textContent    = locale.testing.exit

    // Reminder cards
    ;['water', 'move', 'eyes'].forEach(key => {
      const r    = reminders[key]
      const locR = locale.reminders[key]

      // Keep reminder label/body in sync for popup notifications
      r.label = locR.name
      r.body  = locR.body

      const minutes = r.interval / 60
      const limits  = isTestingMode ? TESTING_LIMITS[key] : NORMAL_LIMITS[key]

      document.getElementById(`card-name-${key}`).textContent  = locR.name
      document.getElementById(`desc-${key}`).innerHTML         = locR.desc(minutes)
      document.getElementById(`val-${key}`).textContent        = `${minutes} ${locale.minFull}`
      document.getElementById(`edit-${key}`).textContent       = locale.editBtn
      document.getElementById(`save-${key}`).textContent       = locale.saveBtn
      document.getElementById(`min-label-${key}`).textContent  = `${limits.min}${locale.minShort}`
      document.getElementById(`max-label-${key}`).textContent  = `${NORMAL_LIMITS[key].max}${locale.minShort}`
    })

    // Water goal section labels
    document.getElementById('goal-height-label').textContent = locale.waterGoal.heightLabel
    document.getElementById('goal-weight-label').textContent = locale.waterGoal.weightLabel
    document.getElementById('save-goal').textContent         = locale.waterGoal.saveBtn

    // Auto-launch card
    document.getElementById('autolaunch-name').textContent = locale.autoLaunch.name
    document.getElementById('autolaunch-desc').textContent = locale.autoLaunch.desc

    // Stats button
    document.getElementById('btn-stats').textContent = locale.dashboard.btnOpen

    // Language switcher active state
    document.getElementById('btn-lang-en').classList.toggle('active', currentLang === 'en')
    document.getElementById('btn-lang-vi').classList.toggle('active', currentLang === 'vi')

    // Status bar
    updateStatus()

    // Re-render modal content if it's currently open (language switch)
    if (currentInfoKey) renderInfoModal()

    // Re-render stats labels (text changes between EN/VI)
    if (typeof initStatsDisplay === 'function') initStatsDisplay()

    // Update onboarding texts if overlay is visible
    const _overlay = document.getElementById('onboarding-overlay')
    if (_overlay && _overlay.style.display !== 'none') applyOnboardingLocale()

    // Update auth card + dialog strings
    if (typeof applyAuthLocale === 'function') applyAuthLocale()

    // Update account card + dialog strings
    if (typeof applyAccountLocale === 'function') applyAccountLocale()

    // Update feedback card + dialog strings
    if (typeof applyFeedbackLocale === 'function') applyFeedbackLocale()
  }
  // ────────────────────────────────────────────────────────────────────────

  // ── Feature flag ─────────────────────────────────────────────────────────
  const TESTING_MODE_ENABLED = true
  // ────────────────────────────────────────────────────────────────────────

  // ── Audio ─────────────────────────────────────────────────────────────────
  function playSound(key) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)()
      ctx.resume().then(() => {
        const s = { water: { freq: 520, pulses: 2 }, move: { freq: 440, pulses: 3 }, eyes: { freq: 660, pulses: 1 } }[key]
        for (let i = 0; i < s.pulses; i++) {
          const osc  = ctx.createOscillator()
          const gain = ctx.createGain()
          osc.connect(gain)
          gain.connect(ctx.destination)
          osc.type = 'sine'
          osc.frequency.value = s.freq
          const start = ctx.currentTime + i * 0.25
          const end   = start + 0.15
          gain.gain.setValueAtTime(0, start)
          gain.gain.linearRampToValueAtTime(0.4, start + 0.01)
          gain.gain.linearRampToValueAtTime(0, end)
          osc.start(start)
          osc.stop(end + 0.05)
        }
        setTimeout(() => ctx.close(), s.pulses * 300 + 500)
      })
    } catch (e) {
      console.warn('Audio error:', e)
    }
  }
  // ────────────────────────────────────────────────────────────────────────

  // ── Interval limits ───────────────────────────────────────────────────────
  const NORMAL_LIMITS = {
    water: { min: 20, max: 60, default: 30 },
    move:  { min: 45, max: 90, default: 60 },
    eyes:  { min: 15, max: 30, default: 20 },
  }
  const TESTING_LIMITS = {
    water: { min: 1, max: 60, default: 30 },
    move:  { min: 1, max: 90, default: 60 },
    eyes:  { min: 1, max: 30, default: 20 },
  }
  // ────────────────────────────────────────────────────────────────────────

  let isTestingMode  = false
  let logoClickCount = 0
  let logoClickTimer = null

  // ── Reminder data (labels pulled from locale at startup) ──────────────────
  const reminders = {
    water: {
      label: locale.reminders.water.name,
      body:  locale.reminders.water.body,
      interval: 30 * 60, remaining: 30 * 60,
      active: true, timer: null, pendingInterval: 30 * 60,
    },
    move: {
      label: locale.reminders.move.name,
      body:  locale.reminders.move.body,
      interval: 60 * 60, remaining: 60 * 60,
      active: true, timer: null, pendingInterval: 60 * 60,
    },
    eyes: {
      label: locale.reminders.eyes.name,
      body:  locale.reminders.eyes.body,
      interval: 20 * 60, remaining: 20 * 60,
      active: true, timer: null, pendingInterval: 20 * 60,
    },
  }
  // ────────────────────────────────────────────────────────────────────────

  // ── Testing mode ──────────────────────────────────────────────────────────
  function handleLogoClick() {
    if (!TESTING_MODE_ENABLED) return
    logoClickCount++
    clearTimeout(logoClickTimer)
    logoClickTimer = setTimeout(() => { logoClickCount = 0 }, 3000)
    if (logoClickCount >= 10) {
      logoClickCount = 0
      clearTimeout(logoClickTimer)
      enterTestingMode()
    }
  }

  function enterTestingMode() {
    isTestingMode = true
    document.getElementById('testing-badge').classList.add('visible')
    Object.keys(reminders).forEach(key => {
      const limits = TESTING_LIMITS[key]
      const slider = document.getElementById(`slider-${key}`)
      slider.min = limits.min
      document.getElementById(`min-label-${key}`).textContent = `${limits.min}${locale.minShort}`
    })
  }

  function exitTestingMode() {
    isTestingMode = false
    document.getElementById('testing-badge').classList.remove('visible')
    Object.keys(reminders).forEach(key => {
      const limits = NORMAL_LIMITS[key]
      const slider = document.getElementById(`slider-${key}`)
      if (parseInt(slider.value) < limits.min) {
        slider.value = limits.default
        const r = reminders[key]
        r.pendingInterval = limits.default * 60
        r.interval        = r.pendingInterval
        r.remaining       = r.interval
        document.getElementById(`val-${key}`).textContent   = `${limits.default} ${locale.minFull}`
        document.getElementById(`desc-${key}`).innerHTML    = locale.reminders[key].desc(limits.default)
        document.getElementById(`timer-${key}`).textContent = formatTime(r.interval)
        if (r.active) startTimer(key)
      }
      slider.min = limits.min
      document.getElementById(`min-label-${key}`).textContent = `${limits.min}${locale.minShort}`
    })
    saveSettings()
  }

  function clearCache() {
    ;[STORAGE_KEY, WATER_GOAL_KEY, STATS_KEY, HISTORY_KEY, ONBOARDED_KEY].forEach(k => localStorage.removeItem(k))
    location.reload()
  }
  // ────────────────────────────────────────────────────────────────────────

  // ── IPC listeners (registered once) ──────────────────────────────────────
  ipcRenderer.on('pause-timer', (event, key) => {
    const r = reminders[key]
    if (r && r.timer) { clearInterval(r.timer); r.timer = null }
  })

  ipcRenderer.on('popup-closed', (event, key) => {
    const r = reminders[key]
    if (!r) return
    r.remaining = r.interval
    document.getElementById(`timer-${key}`).textContent = formatTime(r.interval)
    if (r.active) startTimer(key)
  })

  ipcRenderer.on('popup-confirmed', (event, key) => {
    incrementStat(key)
  })

  ipcRenderer.on('popup-skipped', (event, key) => {
    const skipKey = key + '_skips'
    dailyStats[skipKey] = (dailyStats[skipKey] || 0) + 1
    saveStats(dailyStats)
    syncTodayToHistory()
    if (analyticsAgg) analyticsAgg(todayStr(), key, 'skip').catch(() => {})
  })
  // ────────────────────────────────────────────────────────────────────────

  function sendNotification(key) {
    const r = reminders[key]
    let body = r.body

    if (key === 'water' && waterGoal) {
      const intakeMl    = (dailyStats.water || 0) * waterGoal.mlPerSession
      const remainingMl = Math.max(0, waterGoal.dailyGoal - intakeMl)
      body = locale.waterGoal.popupBody(waterGoal.mlPerSession, remainingMl)
    }

    ipcRenderer.send('show-popup', {
      key,
      title:      r.label,
      body,
      btnConfirm: locale.popup.confirm,
      btnSkip:    locale.popup.skip,
    })
    playSound(key)
  }

  function startTimer(key) {
    const r = reminders[key]
    if (r.timer) clearInterval(r.timer)
    r.timer = setInterval(() => {
      if (r.remaining <= 0) {
        sendNotification(key)
        r.remaining = r.interval
      } else {
        r.remaining--
      }
      document.getElementById(`timer-${key}`).textContent = formatTime(r.remaining)
    }, 1000)
  }

  function stopTimer(key) {
    const r = reminders[key]
    if (r.timer) clearInterval(r.timer)
    r.timer     = null
    r.remaining = r.interval
    document.getElementById(`timer-${key}`).textContent = formatTime(r.interval)
  }

  function toggleReminder(key) {
    const r = reminders[key]
    r.active = !r.active
    document.getElementById(`toggle-${key}`).classList.toggle('off', !r.active)
    if (r.active) startTimer(key)
    else stopTimer(key)
    updateStatus()
    saveSettings()
  }

  function toggleEdit(key) {
    const expand  = document.getElementById(`expand-${key}`)
    const editBtn = document.getElementById(`edit-${key}`)
    const card    = document.getElementById(`card-${key}`)
    const isOpen  = expand.classList.contains('open')

    // Close all other expanded panels
    Object.keys(reminders).forEach(k => {
      if (k !== key) {
        document.getElementById(`expand-${k}`).classList.remove('open')
        document.getElementById(`edit-${k}`).classList.remove('active')
        document.getElementById(`card-${k}`).classList.remove('expanded')
      }
    })

    expand.classList.toggle('open', !isOpen)
    editBtn.classList.toggle('active', !isOpen)
    card.classList.toggle('expanded', !isOpen)

    // Water card: pre-populate goal inputs when opening
    if (key === 'water' && !isOpen) {
      if (waterGoal) {
        document.getElementById('input-height').value = waterGoal.height
        document.getElementById('input-weight').value = waterGoal.weight
        document.getElementById('goal-recommendation').textContent =
          locale.waterGoal.recommendation(waterGoal.sessions, waterGoal.mlPerSession)
      } else {
        document.getElementById('input-height').value = ''
        document.getElementById('input-weight').value = ''
        document.getElementById('goal-recommendation').textContent = ''
      }
    }
  }

  function onSliderChange(key, val) {
    reminders[key].pendingInterval = parseInt(val) * 60
    document.getElementById(`val-${key}`).textContent = `${val} ${locale.minFull}`
  }

  function saveAndRestart(key) {
    const r       = reminders[key]
    const minutes = r.pendingInterval / 60
    r.interval  = r.pendingInterval
    r.remaining = r.interval
    document.getElementById(`desc-${key}`).innerHTML = locale.reminders[key].desc(minutes)
    if (r.active) startTimer(key)
    else document.getElementById(`timer-${key}`).textContent = formatTime(r.interval)

    document.getElementById(`expand-${key}`).classList.remove('open')
    document.getElementById(`edit-${key}`).classList.remove('active')
    document.getElementById(`card-${key}`).classList.remove('expanded')
    saveSettings()
  }

  function updateStatus() {
    const active = Object.values(reminders).filter(r => r.active).length
    const bar    = document.getElementById('status')
    bar.innerHTML = active === 0
      ? locale.status.allOff
      : locale.status.running(active)
  }

  // ── Persistence ───────────────────────────────────────────────────────────
  const STORAGE_KEY = 'healthbreak-settings'

  function saveSettings() {
    const settings = {}
    Object.keys(reminders).forEach(key => {
      settings[key] = { interval: reminders[key].interval, active: reminders[key].active }
    })
    localStorage.setItem(STORAGE_KEY, JSON.stringify(settings))
    // Sync to Firestore if signed in (defined after auth section initializes)
    if (typeof maybeSyncSettings === 'function') maybeSyncSettings()
  }

  function loadSettings() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY)
      if (!raw) return
      const settings = JSON.parse(raw)
      Object.keys(settings).forEach(key => {
        if (!reminders[key]) return
        const s      = settings[key]
        const r      = reminders[key]
        const limits = NORMAL_LIMITS[key]
        const minutes = clampInterval(s.interval / 60, limits)
        r.interval        = minutes * 60
        r.remaining       = r.interval
        r.pendingInterval = r.interval
        r.active          = s.active !== false
        // Only update non-text UI (applyLocale handles all text)
        document.getElementById(`slider-${key}`).value         = minutes
        document.getElementById(`timer-${key}`).textContent    = formatTime(r.interval)
        document.getElementById(`toggle-${key}`).classList.toggle('off', !r.active)
      })
    } catch (e) {
      console.warn('Could not load settings:', e)
    }
  }
  // ────────────────────────────────────────────────────────────────────────

  // ── Auto-launch ───────────────────────────────────────────────────────────
  async function initAutoLaunch() {
    const enabled = await ipcRenderer.invoke('get-auto-launch')
    document.getElementById('toggle-autolaunch').classList.toggle('off', !enabled)

  // ── Sign-in flow ───────────────────────────────────────────────────────────
  async function handleAuthClick() {
    if (!IS_CONFIGURED) return
    const btn = document.getElementById('btn-auth')

    if (currentUser) {
      // Sign out
      try {
        await signOut(auth)
        await ipcRenderer.invoke('safe-storage-delete')
        localStorage.removeItem(AUTH_MODE_KEY)
      } catch (e) {
        console.error('Sign-out error:', e)
      }
      return
    }

    // Start sign-in
    btn.disabled    = true
    btn.textContent = locale.auth.signingIn

    const pkce       = generatePKCE()
    const redirectUri = await ipcRenderer.invoke('oauth-start-server')
    _pkceSession     = { ...pkce, redirectUri }
    const authUrl    = buildGoogleAuthUrl(GOOGLE_CLIENT_ID, pkce.codeChallenge, pkce.state, redirectUri)
    ipcRenderer.send('open-auth-browser', authUrl)

    btn.textContent = locale.auth.signingInWait

    // Reset button after 90s if OAuth callback never arrives (e.g. user closed browser)
    _oauthTimeout = setTimeout(() => {
      _pkceSession = null
      ipcRenderer.invoke('oauth-cancel-server').catch(() => {})
      if (btn) { btn.disabled = false; btn.textContent = locale.auth.btnSignIn }
    }, 90 * 1000)
  }

  // ── OAuth callback from main process ──────────────────────────────────────
  ipcRenderer.on('oauth-callback', async (event, callbackUrl) => {
    clearTimeout(_oauthTimeout)
    _oauthTimeout = null
    const btn = document.getElementById('btn-auth')
    try {
      const parsed = parseCallbackUrl(callbackUrl)
      if (!parsed || !_pkceSession) throw new Error('Invalid callback')
      if (parsed.error) throw new Error(`OAuth error: ${parsed.error}`)
      if (parsed.state !== _pkceSession.state) throw new Error('State mismatch — possible CSRF')

      const tokens = await exchangeCodeForTokens(
        parsed.code,
        _pkceSession.codeVerifier,
        GOOGLE_CLIENT_ID,
        _pkceSession.redirectUri,
        GOOGLE_CLIENT_SECRET
      )
      _pkceSession = null

      // Sign in to Firebase with the Google credential
      const credential  = GoogleAuthProvider.credential(tokens.id_token, tokens.access_token)
      const signedUser  = await signInWithCredential(auth, credential)

      // Persist refresh token encrypted
      if (tokens.refresh_token) {
        await ipcRenderer.invoke('safe-storage-set', JSON.stringify({
          refreshToken: tokens.refresh_token,
          uid: signedUser?.uid,
        }))
      }

    } catch (e) {
      console.error('OAuth callback error:', e)
      _pkceSession = null
      showToast(locale.auth.signInError, 4000)
      if (btn) { btn.disabled = false; btn.textContent = locale.auth.btnSignIn }
    }
  })

  // ── Firebase auth state listener ───────────────────────────────────────────
  let _authInitialized = false

  function initAuth() {
    if (!IS_CONFIGURED || !auth) {
      renderAuthUI()
      return
    }

    onAuthStateChanged(auth, async (user) => {
      const wasNull = !currentUser
      currentUser = user

      renderAuthUI()

      if (!_authInitialized) {
        _authInitialized = true

        if (user) {
          // First load with an existing Firebase session — check for cloud settings
          await handleFirstLoginWithUser(user, false)
        } else {
          // Firebase has no session — try silent restore via stored refresh token
          try {
            const stored = await ipcRenderer.invoke('safe-storage-get')
            if (stored) {
              const { refreshToken } = JSON.parse(stored)
              if (refreshToken) {
                const tokens = await refreshAccessToken(refreshToken, GOOGLE_CLIENT_ID)
                const credential = GoogleAuthProvider.credential(tokens.id_token, tokens.access_token)
                await signInWithCredential(auth, credential)
                // onAuthStateChanged will fire again with the restored user
              }
            }
          } catch (e) {
            console.error('Silent token restore failed:', e)
          }
        }
        return
      }

      if (user && wasNull) {
        // Fresh login just completed
        await handleFirstLoginWithUser(user, true)
      } else if (!user && !wasNull) {
        // Signed out
        localStorage.removeItem(AUTH_MODE_KEY)
      }
    })
  }

  // ── First login / restore logic ────────────────────────────────────────────
  async function handleFirstLoginWithUser(user, isFreshLogin) {
    try {
      const cloudSettings = await loadSettingsFromFirestore(user.uid)
      const hasLocal = !!localStorage.getItem(STORAGE_KEY)

      if (isFreshLogin) {
        if (hasLocal && !cloudSettings) {
          // Local data, no cloud data → offer to sync
          showMigrationDialog()
        } else if (cloudSettings) {
          if (hasLocal) {
            // Both local and cloud data → let user choose
            showMigrationDialog()
          } else {
            // Only cloud data → offer to restore
            showRestoreDialog()
          }
        } else {
          // No data anywhere → just switch to online mode and save current settings
          localStorage.setItem(AUTH_MODE_KEY, 'online')
          await syncSettingsToFirestore(user.uid)
        }
      } else {
        // Returning session — silently restore if no local settings
        if (!hasLocal && cloudSettings) {
          applyCloudSettings(cloudSettings)
        }
        localStorage.setItem(AUTH_MODE_KEY, 'online')
      }
    } catch (e) {
      console.error('handleFirstLoginWithUser error:', e)
    }
  }

  // ── Migration dialog ───────────────────────────────────────────────────────
  function showMigrationDialog() {
    document.getElementById('migration-backdrop').classList.add('open')
  }
  function hideMigrationDialog() {
    document.getElementById('migration-backdrop').classList.remove('open')
  }

  async function handleMigrationSync() {
    hideMigrationDialog()
    if (!currentUser) return
    localStorage.setItem(AUTH_MODE_KEY, 'online')
    await syncSettingsToFirestore(currentUser.uid)
    showToast(locale.auth.syncOk)
  }

  async function handleMigrationFresh() {
    // "Start fresh" — discard local data, sync current local settings to cloud
    hideMigrationDialog()
    if (!currentUser) return
    localStorage.setItem(AUTH_MODE_KEY, 'online')
    try {
      await syncSettingsToFirestore(currentUser.uid)
      showToast(locale.auth.syncOk)
    } catch (e) {
      console.error('handleMigrationFresh error:', e)
    }
  }

  // ── Restore dialog ─────────────────────────────────────────────────────────
  function showRestoreDialog() {
    document.getElementById('restore-backdrop').classList.add('open')
  }
  function hideRestoreDialog() {
    document.getElementById('restore-backdrop').classList.remove('open')
  }

  async function handleRestoreYes() {
    hideRestoreDialog()
    if (!currentUser) return
    localStorage.setItem(AUTH_MODE_KEY, 'online')
    try {
      const cloudSettings = await loadSettingsFromFirestore(currentUser.uid)
      if (cloudSettings) {
        applyCloudSettings(cloudSettings)
        showToast(locale.auth.syncOk)
      }
    } catch (e) {
      console.error('handleRestoreYes error:', e)
    }
  }

  function handleRestoreSkip() {
    hideRestoreDialog()
    if (!currentUser) return
    localStorage.setItem(AUTH_MODE_KEY, 'online')
    syncSettingsToFirestore(currentUser.uid).catch(console.error)
  }

  // ── Firestore: settings schema ─────────────────────────────────────────────
  // users/{uid}/settings  →  { water, move, eyes, lang, waterGoal, updatedAt }
  //   each of water/move/eyes: { interval: minutes, active: bool }

  function buildFirestoreSettings() {
    return {
      water:      { interval: Math.round(reminders.water.interval / 60), active: reminders.water.active },
      move:       { interval: Math.round(reminders.move.interval  / 60), active: reminders.move.active  },
      eyes:       { interval: Math.round(reminders.eyes.interval  / 60), active: reminders.eyes.active  },
      lang:       currentLang,
      waterGoal:  waterGoal || null,
      updatedAt:  serverTimestamp(),
    }
  }

  async function syncSettingsToFirestore(uid) {
    if (!db || !uid) return
    try {
      const ref = doc(db, 'users', uid, 'settings', 'main')
      await setDoc(ref, buildFirestoreSettings(), { merge: true })
    } catch (e) {
      console.warn('Firestore sync error:', e)
      showToast(locale.auth.syncError, 3500)
    }
  }

  async function loadSettingsFromFirestore(uid) {
    if (!db || !uid) return null
    try {
      const ref  = doc(db, 'users', uid, 'settings', 'main')
      const snap = await getDoc(ref)
      return snap.exists() ? snap.data() : null
    } catch (e) {
      console.warn('Firestore load error:', e)
      return null
    }
  }

  // ── Apply cloud settings to the UI ────────────────────────────────────────
  let _applyingCloudSettings = false

  function applyCloudSettings(s) {
    if (!s) return
    _applyingCloudSettings = true
    ;['water', 'move', 'eyes'].forEach(key => {
      const r = reminders[key]
      if (!s[key]) return
      const limits  = NORMAL_LIMITS[key]
      const minutes = Math.max(limits.min, Math.min(limits.max, s[key].interval || limits.default))
      r.interval        = minutes * 60
      r.remaining       = r.interval
      r.pendingInterval = r.interval
      r.active          = s[key].active !== false
      document.getElementById(`slider-${key}`).value         = minutes
      document.getElementById(`timer-${key}`).textContent    = formatTime(r.interval)
      document.getElementById(`toggle-${key}`).classList.toggle('off', !r.active)
      if (r.active) startTimer(key)
      else stopTimer(key)
    })
    if (s.lang && s.lang !== currentLang) setLanguage(s.lang)
    if (s.waterGoal) {
      waterGoal = s.waterGoal
      persistWaterGoal()
    }
    applyLocale()
    saveSettings()
    _applyingCloudSettings = false
  }

  // ── Auto-sync on settings changes (online mode only) ──────────────────────
  function maybeSyncSettings() {
    if (_applyingCloudSettings) return   // skip write-back when applying inbound cloud data
    if (currentUser && localStorage.getItem(AUTH_MODE_KEY) === 'online') {
      syncSettingsToFirestore(currentUser.uid).catch(console.error)
    }
  }
  // ────────────────────────────────────────────────────────────────────────

  // ── Bootstrap ─────────────────────────────────────────────────────────────
  loadSettings()     // restore intervals + toggle states from localStorage
  loadWaterGoal()    // restore saved water goal (must run before applyLocale/initStats)
  applyLocale()      // apply all locale strings (runs after loadSettings so intervals are correct)
  applyAuthLocale()    // auth card + dialog strings
  applyFeedbackLocale() // feedback card + dialog strings
  initOnboarding()   // show onboarding overlay if first run
  initAutoLaunch()   // async — updates auto-launch toggle
  initAuth()         // start Firebase auth state listener
  initStatsDisplay() // render today's confirmed counts on cards
  Object.keys(reminders).forEach(key => { if (reminders[key].active) startTimer(key) })
  ipcRenderer.send('set-language', currentLang)  // sync tray menu with saved language
  // ────────────────────────────────────────────────────────────────────────
</script>
</body>
</html>
